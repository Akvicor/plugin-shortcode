name: CD

on:
  release:
    types:
      - published

jobs:
  cd:
    uses: halo-sigs/reusable-workflows/.github/workflows/plugin-cd.yaml@v3
    secrets:
      halo-pat: ${{ secrets.HALO_PAT }}
    permissions:
      contents: write
    with:
      java-version: 21
      node-version: 20
      pnpm-version: 10
      app-id: app-plugin-shortcode
      ui-path: "console"
